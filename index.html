<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Report Maker</title>
    <style>
        /* --- CORE APP LAYOUT --- */
        html, body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 0;
            background-color: #f4f7f6; color: #000;
            height: 100vh; width: 100vw;
            overflow: hidden; position: fixed;
        }

        .page {
            display: none; height: 100%; width: 100%;
            flex-direction: column; overflow: hidden;
        }
        .page.active { display: flex; }

        /* --- SCREEN 1: TITLE/INFO PAGE --- */
        #page-info {
            background: #0066cc;
            justify-content: center; align-items: center;
        }
        .info-card {
            background: white; width: 85%; padding: 20px;
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .info-card h2 { color: #0066cc; margin-top: 0; text-align: center; font-size: 1.2rem; }
        
        .input-box { margin-bottom: 12px; }
        .input-box label { display: block; font-size: 0.65rem; font-weight: bold; color: #666; text-transform: uppercase; }
        .input-box input { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; 
            box-sizing: border-box; font-weight: bold; font-size: 1rem;
        }

        .btn-main {
            width: 100%; padding: 15px; background: #28a745; color: white;
            border: none; border-radius: 8px; font-weight: 900; cursor: pointer;
        }

        /* --- SCREEN 2: GRADING PAGE --- */
        .top-nav {
            background: white; padding: 6px 12px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd;
        }
        .mode-toggle { background: #eee; border-radius: 20px; padding: 2px; display: flex; }
        .m-btn { padding: 4px 12px; border: none; background: transparent; font-size: 0.7rem; font-weight: bold; border-radius: 15px; }
        .m-btn.active { background: #0066cc; color: white; }

        .table-container { flex: 1; overflow: auto; padding: 4px; }
        table { border-collapse: collapse; width: 100%; min-width: 850px; table-layout: fixed; }
        th { background: #0066cc; color: white; font-size: 9px; padding: 4px 0; border: 1px solid #0052a3; }
        td { border: 1px solid #ddd; padding: 2px; text-align: center; font-size: 11px; }
        .subject-name { position: sticky; left: 0; background: #f9fbfd; font-weight: 900; text-align: left; border-right: 2px solid #0066cc; padding-left: 5px; }

        .marks-input { width: 90%; border: 1px solid #ccc; text-align: center; font-weight: 900; padding: 2px 0; border-radius: 3px; }

        /* --- DASHBOARD --- */
        .dash { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 6px; background: #fff; border-top: 1px solid #ddd; }
        .stat { text-align: center; border: 1px solid #eee; padding: 4px; border-radius: 6px; }
        .stat label { font-size: 0.55rem; color: #666; display: block; }
        .stat b { font-size: 0.85rem; }

        .bottom-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 6px; background: #fff; }
        .action-btn { padding: 8px 0; border: none; color: white; border-radius: 4px; font-size: 0.6rem; font-weight: bold; }

        /* --- PRINT STYLES --- */
        @media print {
            body, html { overflow: visible; position: static; height: auto; background: white; }
            .page { display: block !important; height: auto !important; }
            #page-info { background: white !important; padding: 0; }
            .info-card { box-shadow: none; border: 1pt solid #000; width: 100%; margin-bottom: 20px; }
            .top-nav, .bottom-actions, .btn-main { display: none !important; }
            .table-container { overflow: visible; }
            table { min-width: 100%; width: 100%; }
            /* No page-break-after here as requested */
        }

        .text-red { color: #dc3545 !important; text-decoration: underline; }
        .text-green { color: #28a745 !important; }
    </style>
</head>
<body>

    <div id="page-info" class="page active">
        <div class="info-card">
            <h2>Student Progress Report</h2>
            <div class="input-box">
                <label>Full Name</label>
                <input type="text" id="stu-name" oninput="autoSave()">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="input-box" style="flex:1">
                    <label>Roll No</label>
                    <input type="number" id="stu-roll" oninput="autoSave()">
                </div>
                <div class="input-box" style="flex:1">
                    <label>Class</label>
                    <input type="text" id="stu-class" oninput="autoSave()">
                </div>
            </div>
            <button class="btn-main" onclick="goToGrading()">START GRADING →</button>
        </div>
    </div>

    <div id="page-grading" class="page">
        <div class="top-nav">
            <button onclick="goToInfo()" style="border:none; background:#666; color:white; padding:5px 10px; border-radius:4px; font-size:0.6rem;">← BACK</button>
            <div class="mode-toggle">
                <button id="m-pms" class="m-btn active" onclick="switchMode('PMS')">PMS</button>
                <button id="m-pre" class="m-btn" onclick="switchMode('PRE')">PRE</button>
            </div>
            <button onclick="calculateAll()" style="border:none; background:#28a745; color:white; padding:5px 10px; border-radius:4px; font-size:0.6rem; font-weight:bold;">CALC</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th rowspan="2" style="width:120px; position:sticky; left:0; z-index:10;">SUBJECTS</th>
                        <th colspan="5">Assessments</th>
                        <th colspan="4" style="background:#004c99">Final Weightage</th>
                    </tr>
                    <tr>
                        <th>U1</th><th>QT</th><th>U2</th><th>HY</th><th>U3</th>
                        <th style="background:#004c99">M 25%</th>
                        <th style="background:#004c99">QH 25%</th>
                        <th style="background:#004c99">A 50%</th>
                        <th style="background:#004c99">Total</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
                <tfoot style="background:#e6f2ff; font-weight:bold;">
                    <tr>
                        <td class="subject-name">Grand Total</td>
                        <td id="gt-0">0</td><td id="gt-1">0</td><td id="gt-2">0</td><td id="gt-3">0</td><td id="gt-4">0</td>
                        <td colspan="3"></td><td id="gt-total">0</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="dash">
            <div class="stat"><label>Status</label><b id="dash-status">AWAITED</b></div>
            <div class="stat" style="border: 1px solid #0066cc;"><label>Percentage</label><b id="dash-pct">--%</b></div>
            <div class="stat"><label>Failed</label><b id="dash-fails" style="font-size:0.6rem; color:red;">NONE</b></div>
        </div>

        <div class="bottom-actions">
            <button class="action-btn" style="background:#0066cc" onclick="downloadBackup()">BACKUP</button>
            <button class="action-btn" style="background:#6f42c1" onclick="document.getElementById('file-loader').click()">LOAD</button>
            <button class="action-btn" style="background:#28a745" onclick="printReport()">PDF</button>
            <button class="action-btn" style="background:#dc3545" onclick="clearAllData()">WIPE</button>
        </div>
    </div>

    <input type="file" id="file-loader" style="display:none" onchange="importData(event)" accept=".json">

<script>
    const subjectsPMS = [
        { name: 'English', max: 100 }, { name: 'Mathematics', max: 100 },
        { name: 'Science', max: 100 }, { name: 'Social Study', max: 100 },
        { name: 'Hindi/Bengali', max: 100 }, { name: 'Computer', max: 100 }
    ];

    let currentMode = 'PMS';

    function goToGrading() { 
        document.getElementById('page-info').classList.remove('active');
        document.getElementById('page-grading').classList.add('active');
        renderTable();
    }

    function goToInfo() {
        document.getElementById('page-grading').classList.remove('active');
        document.getElementById('page-info').classList.add('active');
    }

    function renderTable() {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        subjectsPMS.forEach((subj, sIdx) => {
            let row = body.insertRow();
            let nameCell = row.insertCell();
            nameCell.className = 'subject-name';
            nameCell.innerText = subj.name;

            for (let i = 0; i < 5; i++) {
                let cell = row.insertCell();
                let input = document.createElement('input');
                input.type = 'number'; input.className = 'marks-input';
                input.id = `in-${sIdx}-${i}`;
                input.oninput = autoSave;
                cell.appendChild(input);
            }
            // Weightage Cells
            row.insertCell().id = `m25-${sIdx}`;
            row.insertCell().id = `qh25-${sIdx}`;
            row.insertCell().id = `a50-${sIdx}`;
            row.insertCell().id = `tot-${sIdx}`;
        });
        loadMarks();
    }

    function calculateAll() {
        let grandTotal = 0;
        let failCount = 0;
        let subjectsCount = subjectsPMS.length;

        subjectsPMS.forEach((subj, sIdx) => {
            const getV = (i) => parseFloat(document.getElementById(`in-${sIdx}-${i}`).value) || 0;
            
            // Weightage Logic (Your original logic)
            let m25 = Math.round(((getV(0) + getV(2) + getV(4)) / 3 / subj.max) * 25);
            let qh25 = Math.round(((getV(1) + getV(3)) / 2 / subj.max) * 25);
            let a50 = 0; // Assuming Annual is column 5 if you added it, for now using 0

            let total = m25 + qh25 + a50;
            
            document.getElementById(`m25-${sIdx}`).innerText = m25;
            document.getElementById(`qh25-${sIdx}`).innerText = qh25;
            document.getElementById(`tot-${sIdx}`).innerText = total;

            if(total < 40) {
                document.getElementById(`tot-${sIdx}`).classList.add('text-red');
                failCount++;
            } else {
                document.getElementById(`tot-${sIdx}`).classList.remove('text-red');
            }
            grandTotal += total;
        });

        document.getElementById('gt-total').innerText = grandTotal;
        let pct = (grandTotal / (subjectsCount * 100)) * 100;
        document.getElementById('dash-pct').innerText = pct.toFixed(1) + '%';
        document.getElementById('dash-status').innerText = (failCount > 2) ? "FAILED" : "PROMOTED";
        document.getElementById('dash-status').className = (failCount > 2) ? "text-red" : "text-green";
    }

    function autoSave() {
        const data = {
            name: document.getElementById('stu-name').value,
            roll: document.getElementById('stu-roll').value,
            class: document.getElementById('stu-class').value,
            marks: []
        };
        document.querySelectorAll('.marks-input').forEach(inp => {
            data.marks.push({ id: inp.id, val: inp.value });
        });
        localStorage.setItem('report_cache', JSON.stringify(data));
    }

    function loadMarks() {
        const saved = localStorage.getItem('report_cache');
        if (!saved) return;
        const data = JSON.parse(saved);
        document.getElementById('stu-name').value = data.name || '';
        document.getElementById('stu-roll').value = data.roll || '';
        document.getElementById('stu-class').value = data.class || '';
        data.marks.forEach(m => {
            const inp = document.getElementById(m.id);
            if (inp) inp.value = m.val;
        });
    }

    function printReport() {
        if (typeof AndroidBridge !== "undefined") AndroidBridge.printPDF();
        else window.print();
    }

    function clearAllData() { if(confirm("Clear everything?")) { localStorage.clear(); location.reload(); } }

    window.onload = renderTable;
</script>
</body>
</html>
