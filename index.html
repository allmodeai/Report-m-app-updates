<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Report Maker Pro</title>

    <style>
        /* --- GLOBAL & SAFE AREA --- */
        html, body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 0;
            background-color: #f4f7f6; color: #000;
            height: 100vh; width: 100vw;
            overflow: hidden; position: fixed;
        }

        .app-wrapper {
            display: flex; flex-direction: column; height: 100%; width: 100%;
            padding-top: env(safe-area-inset-top, 5px);
            padding-bottom: env(safe-area-inset-bottom, 10px);
            box-sizing: border-box;
        }

        .page { display: none; height: 100%; width: 100%; flex-direction: column; overflow: hidden; }
        .page.active { display: flex; }

        /* --- TITLE SCREEN --- */
        #page-title { 
            position: absolute; 
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100; 
            justify-content: center; 
            align-items: center; 
            background-color: #0066cc; 
            background-image: url('https://allmodeai.github.io/Report-m-app-updates/title_bg.jpg');
            background-size: 100% 100%; 
            background-position: center center;
            background-repeat: no-repeat;
        }

        .launch-card {
            background: transparent; 
            padding: 30px 20px; 
            width: 88%; 
            height: 85vh; 
            text-align: center; position: relative; display: flex;
            flex-direction: column; justify-content: space-between; overflow: hidden;
        }

        /* WATERMARK INTEGRATION */
        .launch-card::before {
            content: "";
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            background-image: url("https://allmodeai.github.io/Report-m-app-updates/Report_makerAppicon.jpg"); 
            background-repeat: no-repeat;
            background-size: contain;
            opacity: 0.1; 
            pointer-events: none;
            z-index: 0;
        }
        
        .title-btn-group { 
            width: 100%; z-index: 2; position: relative; 
            margin-top: auto; 
            padding-bottom: 10px;
            transform: translateY(25px); 
        }

        /* --- THE CLICK WRAPPERS --- */
        .btn-go-wrapper {
            width: 80%;
            margin: 0 auto 20px auto;
            border-radius: 50px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* START GRADING BUTTON: Emboss kept, solid base kept, drop shadow removed */
        .btn-go { 
            width: 100%; padding: 16px 10px; 
            background-color: #ff6600; 
            background-image: 
                linear-gradient(rgba(255,255,255,0.25) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(255,255,255,0.25) 1px, transparent 1px);
            background-size: 20px 20px; 
            color: white; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3); 
            border: 1px solid #ff9966; 
            border-radius: 50px; font-weight: 900; font-size: 1.2rem; 
            text-transform: uppercase; 
            /* Box-shadow keeps the inner emboss and the 3D edge, removes blurry drop shadow below the shape */
            box-shadow: 
                inset 0 4px 6px rgba(255,255,255,0.4), 
                inset 0 -4px 6px rgba(0,0,0,0.2), 
                0 8px 0 #cc5200; 
            transition: all 0.1s ease; 
            display: block;
            box-sizing: border-box;
            text-align: center;
            pointer-events: none; 
        }
        .btn-go-wrapper:active .btn-go { 
            transform: translateY(8px); 
            box-shadow: 
                inset 0 4px 6px rgba(255,255,255,0.4), 
                inset 0 -4px 6px rgba(0,0,0,0.2), 
                0 0px 0 #cc5200; 
        }

        .btn-up-wrapper {
            width: 60px; height: 60px;
            margin: 0 auto;
            border-radius: 50%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-up { 
            width: 100%; height: 100%; 
            padding: 0 0 10px 0; 
            background-color: #ffcc00; 
            background-image: 
                linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px);
            background-size: 16px 16px; 
            color: #222; 
            border: none; 
            border-radius: 50%; 
            font-weight: 900; 
            font-size: 0.55rem; 
            text-transform: uppercase; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
            transition: transform 0.1s ease; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            position: relative; 
            text-align: center;
            line-height: 1.2;
            box-sizing: border-box;
            pointer-events: none; 
        }
        .btn-up-wrapper:active .btn-up { transform: scale(0.94); }

        /* --- GRADING PAGE --- */
        .container { background: white; border-radius: 8px; display: flex; flex-direction: column; height: 100%; overflow: hidden; margin: 2px; }
        .header-section { padding: 4px; flex-shrink: 0; border-bottom: 1px solid #eee; }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; padding: 0 4px; }
        .btn-menu { background: #004c99; color: white; border: none; padding: 5px 12px; border-radius: 6px; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; }
        .grading-title { font-weight: 900; color: #0066cc; font-size: 0.8rem; text-transform: uppercase; }
        .header-toggle { background: #ff9800; border-radius: 20px; display: flex; padding: 2px; border: 1px solid #e68a00; }
        .header-toggle-btn { padding: 4px 12px; border: none; background: transparent; color: #fff; font-weight: 900; font-size: 0.6rem; text-transform: uppercase; border-radius: 15px; }
        .header-toggle-btn.active { background: #28a745; color: white; }

        .student-info { display: grid; grid-template-columns: 1.4fr 1fr; gap: 3px; padding: 4px; border: 1.5px solid #0066cc; border-radius: 6px; background: #f9fbfd; }
        .info-field { display: flex; flex-direction: column; border-bottom: 1px solid #ddd; }
        .info-field label { font-size: 0.65rem; font-weight: 900; color: #0066cc; text-transform: uppercase; }
        .info-field input, .select-trigger { border: none; background: transparent; font-size: 0.9rem; outline: none; font-weight: 900; color: #000; padding: 0; min-height: 18px; display: flex; align-items: center; }

        /* NO-SCROLL TABLE */
        .table-container { flex: 1; padding: 0 4px; overflow: hidden; display: flex; flex-direction: column; }
        .table-wrap { width: 100%; height: 100%; overflow-x: auto; overflow-y: hidden; border: 1.5px solid #0066cc; border-radius: 4px; }
        table { border-collapse: collapse; min-width: 850px; width: 100%; height: 100%; table-layout: fixed; }
        
        th { background: #0066cc; color: white; padding: 2px 1px; border: 1px solid #0052a3; font-size: 8px; text-transform: uppercase; line-height: 1.1; }
        .top-header { font-size: 10px !important; padding: 2px 2px !important; }
        
        td { border: 1px solid #ddd; padding: 0; text-align: center; font-size: 10px; vertical-align: middle; }
        
        /* MAKES THE LAST COLUMN BOLD */
        tbody td:last-child { font-weight: 900; font-size: 11px; }

        .subject-name { text-align: left; font-weight: 900; background: #f9fbfd; position: sticky; left: 0; z-index: 2; border-right: 2px solid #0066cc; padding: 0 4px; font-size: 13px; white-space: nowrap; width: 110px; overflow: hidden; text-overflow: ellipsis; }
        
        .marks-input { width: 44px; height: 22px; border: 1px solid #bbb; border-radius: 3px; text-align: center; font-size: 12px; font-weight: 900; outline: none; margin: 0 auto; display: flex; align-items: center; justify-content: center; padding: 0; box-sizing: border-box; }
        .marks-input:disabled { color: #888; }

        .footer-row { background: #cbdff2; font-weight: 900; border-top: 2px solid #0066cc; position: sticky; bottom: 0; z-index: 3; }
        .footer-row td { height: 18px; font-size: 11px; }

        /* DASHBOARD SECTION
