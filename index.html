<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Report Maker</title>
    <style>
        /* --- CORE APP LAYOUT --- */
        html, body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 0;
            background-color: #f4f7f6; color: #000;
            height: 100vh; width: 100vw;
            overflow: hidden; position: fixed;
        }

        .page { display: none; height: 100%; width: 100%; flex-direction: column; }
        .page.active { display: flex; }

        /* --- TITLE PAGE (3 BUTTONS) --- */
        #page-info {
            background: linear-gradient(135deg, #0066cc 0%, #004c99 100%);
            justify-content: center; align-items: center;
        }
        .launch-card {
            background: white; width: 85%; padding: 30px 20px;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center; box-sizing: border-box;
        }
        .launch-card h1 { color: #0066cc; margin: 0 0 30px 0; font-weight: 900; text-transform: uppercase; font-size: 1.4rem; letter-spacing: 1px; }

        .btn-stack { display: flex; flex-direction: column; gap: 12px; }
        
        .btn-start {
            padding: 16px; background: #28a745; color: white;
            border: none; border-radius: 12px; font-weight: 900; 
            font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }
        .btn-load {
            padding: 14px; background: #6f42c1; color: white;
            border: none; border-radius: 12px; font-weight: 900; 
            font-size: 0.9rem; cursor: pointer;
        }
        .btn-update {
            padding: 12px; background: #ff9800; color: white;
            border: none; border-radius: 12px; font-weight: 900; 
            font-size: 0.85rem; cursor: pointer; margin-top: 10px;
        }

        /* --- GRADING PAGE --- */
        .top-nav { background: #fff; padding: 6px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1.5px solid #ddd; }
        
        .student-header { padding: 8px; background: #fff; display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 6px; border-bottom: 1px solid #eee; }
        .head-box { display: flex; flex-direction: column; }
        .head-box label { font-size: 0.5rem; font-weight: bold; color: #0066cc; text-transform: uppercase; }
        .head-box input { border: none; border-bottom: 1.5px solid #eee; font-weight: 900; font-size: 0.9rem; padding: 2px 0; outline: none; }
        .head-box input:focus { border-color: #0066cc; }

        .table-container { flex: 1; overflow: auto; padding: 2px; }
        table { border-collapse: collapse; width: 100%; min-width: 850px; table-layout: fixed; }
        th { background: #0066cc; color: white; font-size: 9px; padding: 6px 0; border: 1px solid #0052a3; position: sticky; top: 0; z-index: 5; }
        td { border: 1px solid #ddd; padding: 2px; text-align: center; font-size: 11px; }
        .subject-name { position: sticky; left: 0; background: #f9fbfd; font-weight: 900; text-align: left; border-right: 2.3px solid #0066cc; padding-left: 8px; z-index: 2; }

        .marks-input { width: 85%; border: 1px solid #bbb; text-align: center; font-weight: 900; padding: 4px 0; border-radius: 4px; font-size: 13px; }

        /* --- DASHBOARD --- */
        .dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 6px; background: #f4f7f6; border-top: 1.5px solid #ddd; }
        .stat { background: white; text-align: center; border: 1px solid #ddd; padding: 5px; border-radius: 6px; }
        .stat label { font-size: 0.55rem; font-weight: bold; color: #666; display: block; }
        .stat b { font-size: 0.85rem; font-weight: 900; }

        .bottom-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 8px; background: #fff; }
        .action-btn { padding: 10px 0; border: none; color: white; border-radius: 6px; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; }

        .text-red { color: #dc3545 !important; text-decoration: underline; }
        .text-green { color: #28a745 !important; }
    </style>
</head>
<body>

    <div id="page-info" class="page active">
        <div class="launch-card">
            <h1>Report Maker</h1>
            <div class="btn-stack">
                <button class="btn-start" onclick="goToGrading()">START GRADING →</button>
                <button class="btn-load" onclick="document.getElementById('file-loader').click()">LOAD BACKUP</button>
                <button class="btn-update" onclick="checkForUpdates()">
                    UPDATE APP<br>
                    <span style="font-size: 10px; opacity: 0.9; font-weight: normal;">v1.2.0</span>
                </button>
            </div>
        </div>
    </div>

    <div id="page-grading" class="page">
        <div class="top-nav">
            <button onclick="goToInfo()" style="border:none; background:#666; color:white; padding:6px 12px; border-radius:6px; font-size:0.65rem; font-weight:bold;">← MENU</button>
            <div style="font-weight: 900; color: #0066cc; font-size: 0.8rem; text-transform: uppercase;">Marks Entry</div>
            <button onclick="calculateAll()" style="border:none; background:#28a745; color:white; padding:6px 12px; border-radius:6px; font-size:0.65rem; font-weight:bold;">CALC</button>
        </div>

        <div class="student-header">
            <div class="head-box"><label>Student Name</label><input type="text" id="stu-name" oninput="autoSave()"></div>
            <div class="head-box"><label>Roll</label><input type="number" id="stu-roll" oninput="autoSave()"></div>
            <div class="head-box"><label>Class</label><input type="text" id="stu-class" oninput="autoSave()"></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th rowspan="2" style="width:130px; position:sticky; left:0; z-index:10;">SUBJECTS</th>
                        <th colspan="5">Assessments</th>
                        <th colspan="4" style="background:#004c99">Final Weightage</th>
                    </tr>
                    <tr>
                        <th>U1</th><th>QT</th><th>U2</th><th>HY</th><th>U3</th>
                        <th style="background:#004c99">Mon 25%</th>
                        <th style="background:#004c99">QH 25%</th>
                        <th style="background:#004c99">Ann 50%</th>
                        <th style="background:#004c99">Total</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
                <tfoot style="background:#cbdff2; font-weight:900;">
                    <tr>
                        <td class="subject-name">Grand Total</td>
                        <td id="gt-0">0</td><td id="gt-1">0</td><td id="gt-2">0</td><td id="gt-3">0</td><td id="gt-4">0</td>
                        <td colspan="3"></td><td id="gt-total">0</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="dash">
            <div class="stat"><label>Status</label><b id="dash-status">AWAITED</b></div>
            <div class="stat"><label>Percentage</label><b id="dash-pct">--%</b></div>
            <div class="stat"><label>Result</label><b id="dash-res">--</b></div>
        </div>

        <div class="bottom-actions">
            <button class="action-btn" style="background:#0066cc" onclick="downloadBackup()">Backup</button>
            <button class="action-btn" style="background:#28a745" onclick="printReport()">PDF</button>
            <button class="action-btn" style="background:#dc3545" onclick="clearAllData()">Wipe</button>
        </div>
    </div>

    <input type="file" id="file-loader" style="display:none" onchange="importData(event)" accept=".json">

<script>
    const subjectsPMS = [
        { name: 'English', max: 100 }, { name: 'Mathematics', max: 100 },
        { name: 'Science', max: 100 }, { name: 'Social Study', max: 100 },
        { name: 'Hindi/Bengali', max: 100 }, { name: 'Computer', max: 100 },
        { name: 'G.K.', max: 100 }, { name: 'Moral Sci.', max: 100 }
    ];

    function goToGrading() { 
        document.getElementById('page-info').classList.remove('active');
        document.getElementById('page-grading').classList.add('active');
        renderTable(); 
    }

    function goToInfo() {
        document.getElementById('page-grading').classList.remove('active');
        document.getElementById('page-info').classList.add('active');
    }

    function renderTable() {
        const body = document.getElementById('tableBody');
        if (body.innerHTML !== '') return;

        subjectsPMS.forEach((subj, sIdx) => {
            let row = body.insertRow();
            let nameCell = row.insertCell();
            nameCell.className = 'subject-name';
            nameCell.innerText = subj.name;

            for (let i = 0; i < 5; i++) {
                let cell = row.insertCell();
                let input = document.createElement('input');
                input.type = 'number'; 
                input.className = 'marks-input';
                input.id = `in-${sIdx}-${i}`;
                input.onkeydown = (e) => { if(e.key === '.') e.preventDefault(); };
                input.oninput = autoSave;
                cell.appendChild(input);
            }
            row.insertCell().id = `m25-${sIdx}`;
            row.insertCell().id = `qh25-${sIdx}`;
            row.insertCell().id = `a50-${sIdx}`;
            row.insertCell().id = `tot-${sIdx}`;
        });
        loadCache();
    }

    function calculateAll() {
        let grandTotal = 0;
        let failCount = 0;

        subjectsPMS.forEach((subj, sIdx) => {
            const getV = (i) => {
                let v = document.getElementById(`in-${sIdx}-${i}`).value;
                return v === '' ? 0 : parseInt(v);
            };
            
            let m25 = Math.round(((getV(0) + getV(2) + getV(4)) / 3 / subj.max) * 25);
            let qh25 = Math.round(((getV(1) + getV(3)) / 2 / subj.max) * 25);
            let a50 = 0; 

            let total = m25 + qh25 + a50;
            document.getElementById(`m25-${sIdx}`).innerText = m25;
            document.getElementById(`qh25-${sIdx}`).innerText = qh25;
            document.getElementById(`tot-${sIdx}`).innerText = total;

            if(total < 40 && total > 0) {
                document.getElementById(`tot-${sIdx}`).classList.add('text-red');
                failCount++;
            } else {
                document.getElementById(`tot-${sIdx}`).classList.remove('text-red');
            }
            grandTotal += total;
        });

        document.getElementById('gt-total').innerText = grandTotal;
        let pct = (grandTotal / (subjectsPMS.length * 100)) * 100;
        document.getElementById('dash-pct').innerText = pct.toFixed(1) + '%';
        document.getElementById('dash-status').innerText = (failCount > 0) ? "FAIL" : "PASS";
        document.getElementById('dash-status').className = (failCount > 0) ? "text-red" : "text-green";
    }

    function autoSave() {
        const data = {
            name: document.getElementById('stu-name').value,
            roll: document.getElementById('stu-roll').value,
            class: document.getElementById('stu-class').value,
            marks: []
        };
        document.querySelectorAll('.marks-input').forEach(inp => {
            data.marks.push({ id: inp.id, val: inp.value });
        });
        localStorage.setItem('marks_data_v2', JSON.stringify(data));
    }

    function loadCache() {
        const saved = localStorage.getItem('marks_data_v2');
        if (!saved) return;
        const data = JSON.parse(saved);
        document.getElementById('stu-name').value = data.name || '';
        document.getElementById('stu-roll').value = data.roll || '';
        document.getElementById('stu-class').value = data.class || '';
        data.marks.forEach(m => {
            const inp = document.getElementById(m.id);
            if (inp) inp.value = m.val;
        });
        calculateAll();
    }

    function downloadBackup() {
        const data = localStorage.getItem('marks_data_v2');
        if(!data) return alert("No data!");
        const name = document.getElementById('stu-name').value || "Student";
        if (typeof AndroidBridge !== "undefined") AndroidBridge.saveBackup(data, `${name}_Backup.json`);
    }

    function importData(event) {
        const reader = new FileReader();
        reader.onload = (e) => { 
            localStorage.setItem('marks_data_v2', e.target.result); 
            renderTable();
            location.reload(); 
        };
        reader.readAsText(event.target.files[0]);
    }

    function checkForUpdates() {
        if (typeof AndroidBridge !== "undefined" && AndroidBridge.forceUpdate) AndroidBridge.forceUpdate();
        else alert("Update feature works inside the app.");
    }

    function printReport() {
        if (typeof AndroidBridge !== "undefined") AndroidBridge.printPDF();
        else window.print();
    }

    function clearAllData() { if(confirm("Wipe all data?")) { localStorage.clear(); location.reload(); } }

    window.onload = () => { if(localStorage.getItem('marks_data_v2')) goToGrading(); };
</script>
</body>
</html>
